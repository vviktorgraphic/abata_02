services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Budapest}
      DB_HOST: ${DB_HOST:?DB_HOST must be set in .env}
      DB_PORT: ${DB_PORT:?DB_PORT must be set in .env}
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE must be set in .env}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME must be set in .env}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-none}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-no-reply@abata.local}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      AUTH_LOGIN_IP_LIMIT: ${AUTH_LOGIN_IP_LIMIT:-10}
      AUTH_LOGIN_ACCOUNT_LIMIT: ${AUTH_LOGIN_ACCOUNT_LIMIT:-5}
      AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-900}
      AUTH_LOCKOUT_SECONDS: ${AUTH_LOCKOUT_SECONDS:-900}
      AUTH_RATE_LIMIT_PEPPER: ${AUTH_RATE_LIMIT_PEPPER:?AUTH_RATE_LIMIT_PEPPER must be set in .env}
      BOOKING_BODY_MAX_BYTES: ${BOOKING_BODY_MAX_BYTES:-32768}
      BOOKING_RATE_LIMIT: ${BOOKING_RATE_LIMIT:-10}
      BOOKING_RATE_WINDOW_SECONDS: ${BOOKING_RATE_WINDOW_SECONDS:-60}
      BOOKING_RATE_LOCKOUT_SECONDS: ${BOOKING_RATE_LOCKOUT_SECONDS:-60}
      BOOKING_TRUSTED_ORIGINS: ${BOOKING_TRUSTED_ORIGINS:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:?DB_DATABASE must be set in .env}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME must be set in .env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set in .env}
      TZ: Europe/Budapest
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mysql --protocol=tcp -h 127.0.0.1
          -u "$${MYSQL_USER}" -p"$${MYSQL_PASSWORD}"
          --database "$${MYSQL_DATABASE}" --execute "SELECT 1" >/dev/null 2>&1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  phpmyadmin:
    image: phpmyadmin:latest
    profiles: ["tools"]
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  mysql_data:
